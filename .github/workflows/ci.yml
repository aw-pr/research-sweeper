name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npx vitest run
      - name: Dependency audit (non-blocking)
        run: npm audit --omit=dev || true
